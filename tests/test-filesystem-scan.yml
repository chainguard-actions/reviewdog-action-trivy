name: Test trivy filesystem scan
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          github_token: ${{ github.token }}
          trivy_command: filesystem
          trivy_target: .
          reporter: local
          filter_mode: nofilter
          fail_level: none
          level: warning
      - name: Assert trivy return code output exists
        env:
          TRIVY_RC: ${{ steps.action.outputs.trivy-return-code }}
        run: |
          echo "trivy-return-code: $TRIVY_RC"
          if [ -z "$TRIVY_RC" ]; then
            echo "FAIL: trivy-return-code output was empty"
            exit 1
          fi
          echo "PASS: trivy-return-code=$TRIVY_RC"
      - name: Assert reviewdog return code output exists
        env:
          RD_RC: ${{ steps.action.outputs.reviewdog-return-code }}
        run: |
          echo "reviewdog-return-code: $RD_RC"
          if [ -z "$RD_RC" ]; then
            echo "FAIL: reviewdog-return-code output was empty"
            exit 1
          fi
          echo "PASS: reviewdog-return-code=$RD_RC"
